plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.water_delivery"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.example.water_delivery"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }
}
dependencies {
    // यहाँ कोई पुरानी kotlin-stdlib लाइन नहीं डालनी है, इसे बस खाली रखना है
}
